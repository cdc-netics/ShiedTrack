services:
  mongodb:
    image: mongo:latest
    container_name: shieldtrack-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shieldtrack-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shieldtrack-backend
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/shieldtrack
      - JWT_SECRET=change-this-to-a-secure-secret-in-production
      - PORT=3000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - shieldtrack-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shieldtrack-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - shieldtrack-network

volumes:
  mongodb_data:

networks:
  shieldtrack-network:
    driver: bridge
